name: Build and test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - ae/test-ruff.1
  schedule:
    # 03:00 every Saturday morning
    - cron: '0 3 * * 6'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_test_pytket_macos:
    name: Build and test pytket (macos)
    strategy:
      matrix:
        os: ['macos-15']
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Select Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install conan
      uses: turtlebrowser/get-conan@v1.2
    - name: Set up conan
      run: |
        conan profile detect
        DEFAULT_PROFILE_PATH=`conan profile path default`
        PROFILE_PATH=./conan-profiles/${{ matrix.os }}
        diff ${DEFAULT_PROFILE_PATH} ${PROFILE_PATH} || true
        cp ${PROFILE_PATH} ${DEFAULT_PROFILE_PATH}
        conan remote add tket-libs https://quantinuumsw.jfrog.io/artifactory/api/conan/tket1-libs --index 0
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: tket-dynamic-macos
    - name: further ccache config
      run: |
        ccache --set-config base_dir=${HOME}
        ccache --set-config compiler_check=content
        ccache -p
    - name: Install tket
      run: conan install --requires tket/1.3.39@tket/stable -o boost/*:header_only=True -o tklog/*:shared=True -o tket/*:shared=True
    - name: Install pytket requirements
      run: |
        conan create recipes/pybind11
        conan create recipes/pybind11_json/all --version 0.2.14
    - name: Install pytket requirements
      run: |
        conan create recipes/pybind11
        conan create recipes/pybind11_json/all --version 0.2.14
    - name: Set up Python (pull request)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Build pytket
      run: |
        cd pytket
        if python --version | grep -q '3.13' ; then
          pip install -e . -v
        else
          pip install -e .[ZX] -v
        fi
    - name: Run doctests
      run: |
        cd pytket
        python -m pip install pytest
        python -m pytest --doctest-modules pytket
    - name: Test pytket
      run: |
        cd pytket/tests
        python -m pip install -r requirements.txt
        python -m pytest --ignore=simulator/
    - name: Check type stubs are up-to-date and run mypy
      run: |
        python -m pip install -U mypy pybind11-stubgen
        cd pytket
        ./stub_generation/regenerate_stubs
        git diff --quiet pytket/_tket && echo "Stubs are up-to-date" || exit 1  # fail if stubs change after regeneration
        python -m mypy --config-file=mypy.ini --no-incremental -p pytket -p tests

